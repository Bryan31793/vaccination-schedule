# ─────────────────────────────────────────────────────────────────────────────
# Perfil DEV  —  H2 en memoria, esquema auto-creado, consola habilitada
# Arrancar con:  ./mvnw spring-boot:run
#                (o configurar SPRING_PROFILES_ACTIVE=dev en VS Code launch.json)
# ─────────────────────────────────────────────────────────────────────────────

# ── Base de datos H2 (archivo — persiste entre reinicios) ────────────────────
spring.datasource.url=jdbc:h2:file:./data/vacunaciondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── H2 Console (http://localhost:8080/h2-console) ────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.mx.salud.vacunacion=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=8080

# ── JWT (portal ciudadano) ────────────────────────────────────────────────────
jwt.secret=vacunacion-salud-mexico-jwt-dev-secret-key-256bits-2024!!
jwt.expiration=86400000
