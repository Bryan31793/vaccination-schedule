# ─────────────────────────────────────────────────────────────────────────────
# Perfil PROD  —  MySQL, pool HikariCP, DDL en modo validate
# Configurar variables de entorno antes de arrancar:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
# ─────────────────────────────────────────────────────────────────────────────

# ── Base de datos MySQL ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:vacunacion_adultos}?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:vacunacion}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP (pool de conexiones) ────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.mx.salud.vacunacion=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json
